        <p>Bazodiac Sky zeigt echte astronomische Daten in Echtzeit: das NASA-Bild des Tages, Weltraumwetter mit Sonnenstuerme und geomagnetischen Indizes, erdnahe Asteroiden, Einschlagsrisiken (JPL Sentry), aktuelle Planetenpositionen berechnet mit der Astronomy Engine, Live-Bilder der Erde vom DSCOVR-Satelliten und aktuelle Fotos des Mars-Rovers Curiosity. Alle Daten stammen von offiziellen NASA Open APIs. Bitte aktivieren Sie JavaScript, um die interaktive Ansicht zu nutzen.</p>
